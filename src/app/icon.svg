<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    :root { --bg: #050510; --s1: #00ffff; --s2: #bf5af2; }
    @media (prefers-color-scheme: light) {
      :root { --bg: #f0f0f5; --s1: #0088aa; --s2: #7b2db5; }
    }
  </style>
  <rect width="32" height="32" rx="7" fill="var(--bg)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="var(--s1)"/>
      <stop offset="100%" stop-color="var(--s2)"/>
    </linearGradient>
  </defs>
  <polyline points="20 8 26 16 20 24" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="12 8 6 16 12 24" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="18" y1="6" x2="14" y2="26" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
</svg>
